<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Գրանցվել որպես Պատվիրատու - ArmWork</title>
    <!-- Թեման բեռնում ենք շուտ, որ dark mode-ը չթարթի էջի բացման պահին -->
    <script src="js/theme.js"></script>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="site-body">

    <header class="site-header">
        <div class="logo-area">
            <div class="logo-box">AW</div>
            <span class="brand-name">ArmWork</span>
        </div>
        <a href="login-client.html" class="back-link">← Հետ գնալ</a>
    </header>

    <main class="form-container">
        <div class="form-card">
            <h2 class="form-title">Ստեղծել Պատվիրատուի Հաշիվ</h2>
            <p class="form-subtitle">Մուտքագրեք ձեր տվյալները հայտարարություններ տեղադրելու համար</p>

            <form id="registerClientForm" data-role="client">
                <div class="input-group">
                    <label for="company-name">Անուն / Ընկերության Անվանում</label>
                    <input type="text" id="company-name" placeholder="«Ալֆա Թեք» ՍՊԸ կամ Արմեն Գրիգորյան" required>
                </div>

                <div class="input-group">
                    <label for="company-email">Էլ. Փոստ</label>
                    <input type="email" id="company-email" placeholder="hr@company.com" required>
                </div>

                <div class="input-group">
                    <label for="client-username">Username</label>
                    <input type="text" id="client-username" placeholder="alpha_tech" required>
                </div>

                <div class="input-group">
                    <label for="company-password">Գաղտնաբառ</label>
                    <input type="password" id="company-password" placeholder="Նվազագույնը 8 նիշ" required>
                </div>

                <button type="submit" class="btn-submit">Ստեղծել հաշիվ</button>
                <p class="form-message" id="registerClientMessage"></p>
            </form>
        </div>
    </main>

    <footer class="site-footer">
        &copy; 2026 ArmWork. Բոլոր իրավունքները պաշտպանված են:
    </footer>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
